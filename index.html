<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#050A0F" />
  <meta name="color-scheme" content="dark" />

  <!-- PWA -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="SigmaWR" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/manifest.webmanifest" />

  <!-- SEO & OG -->
  <title>DMAIC War Room — Six Sigma Black Belt Platform</title>
  <meta name="description" content="End-to-end Six Sigma analytics. Sigma calculator, DMAIC tracker, FMEA, COPQ, SPC charts, Pareto, Root Cause, AI Triage. 100% client-side, offline-ready PWA." />
  <meta name="keywords" content="Six Sigma, DMAIC, FMEA, COPQ, SPC, Pareto, Black Belt, process improvement" />
  <meta name="author" content="Alfin Maulana Yudistira" />

  <!-- Open Graph -->
  <meta property="og:type"        content="website" />
  <meta property="og:title"       content="DMAIC War Room — Six Sigma Black Belt Platform" />
  <meta property="og:description" content="Professional Six Sigma analytics for any company. DMAIC, FMEA, SPC, COPQ, AI Triage. Offline-ready PWA." />
  <meta property="og:image"       content="/og-image.png" />

  <!-- Preconnect fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet" />

  <style>
    /* Critical path CSS — prevents FOUC */
    html, body { margin: 0; background: #050A0F; color: #E2EEF9; }
    #root { min-height: 100vh; }
    /* Skip-to-content link (a11y) */
    .skip-link {
      position: absolute; top: -999px; left: 0;
      background: #00D4FF; color: #050A0F;
      padding: 0.5rem 1rem; font-family: monospace; font-size: 0.8rem;
      z-index: 999999; text-decoration: none; border-radius: 0 0 4px 0;
    }
    .skip-link:focus { top: 0; }
    /* Loading spinner */
    #root:empty::after {
      content: '';
      display: block;
      width: 24px; height: 24px;
      border: 2px solid #112233;
      border-top-color: #00D4FF;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 45vh auto 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <!-- Skip to main content — accessibility requirement -->
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <div id="root" role="application" aria-label="DMAIC War Room"></div>

  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
