<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#050A0F" />
  <meta name="color-scheme" content="dark" />

  <!-- PWA -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="SigmaWR" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/manifest.webmanifest" />

  <!-- Favicon -->
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="icon" type="image/x-icon" href="/favicon.ico" />

  <!-- SEO & OG -->
  <title>DMAIC War Room — Six Sigma Black Belt Platform</title>
  <meta name="description" content="End-to-end Six Sigma analytics. Sigma calculator, DMAIC tracker, FMEA, COPQ, SPC charts, Pareto, Root Cause, AI Triage. 100% client-side, offline-ready PWA." />
  <meta name="keywords" content="Six Sigma, DMAIC, FMEA, COPQ, SPC, Pareto, Black Belt, process improvement" />
  <meta name="author" content="Alfin Maulana Yudistira" />

  <!-- Open Graph -->
  <meta property="og:type"        content="website" />
  <meta property="og:title"       content="DMAIC War Room — Six Sigma Black Belt Platform" />
  <meta property="og:description" content="Professional Six Sigma analytics for any company. DMAIC, FMEA, SPC, COPQ, AI Triage. Offline-ready PWA." />
  <meta property="og:image"       content="/og-image.png" />
  <meta property="og:url"         content="https://sixsigma-war-room.vercel.app" />
  <meta property="og:site_name"   content="Six Sigma War Room" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="DMAIC War Room — Six Sigma Black Belt Platform" />
  <meta name="twitter:description" content="Professional Six Sigma analytics. Offline-ready PWA." />
  <meta name="twitter:image" content="/og-image.png" />

  <!-- Performance: DNS Prefetch + Preconnect -->
  <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
  <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  
  <!-- Fonts (gabungan dari A dan B: DM Sans tambahan) -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />

  <!-- Security: Prevent clickjacking (optional, bisa di server header juga) -->
  <meta http-equiv="X-Frame-Options" content="DENY" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />

  <!-- Critical CSS inline (dari Versi A + peningkatan) -->
  <style>
    /* Reset & base */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      margin: 0;
      background: #050A0F;
      color: #E2EEF9;
      font-family: 'DM Sans', system-ui, -apple-system, 'Segoe UI', sans-serif;
      scroll-behavior: smooth;
    }
    #root {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    /* Skip-to-content link (a11y) */
    .skip-link {
      position: absolute;
      top: -999px;
      left: 0;
      background: #00D4FF;
      color: #050A0F;
      padding: 0.75rem 1.5rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.875rem;
      font-weight: 700;
      z-index: 999999;
      text-decoration: none;
      border-radius: 0 0 4px 0;
      transition: top 0.1s ease-in;
    }
    .skip-link:focus {
      top: 0;
    }
    /* Loading spinner (lebih smooth) */
    #root:empty {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    #root:empty::after {
      content: 'σ';
      font-family: 'Space Mono', monospace;
      font-size: 2rem;
      font-weight: 700;
      color: #00D4FF;
      animation: pulse 1.2s ease-in-out infinite;
      display: inline-block;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(0.95); }
      50% { opacity: 1; transform: scale(1.1); }
    }
    /* Prevent FOUC for non-critical sections */
    .no-fouc { opacity: 0; }
  </style>
</head>
<body>
  <!-- Skip to main content — accessibility -->
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <div id="root" role="application" aria-label="DMAIC War Room"></div>

  <!-- Load main entry point -->
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
